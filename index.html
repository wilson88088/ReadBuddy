<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ReadBuddy 閱讀小幫手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --mint: #C8E6C9;
  --mint-light: #E8F5E9;
  --mint-bg: #EAF5EA;
  --green: #4CAF50;
  --green-dark: #388E3C;
  --dark: #1B2838;
  --dark-card: #223044;
  --dark-surface: #2A3A50;
  --accent: #66BB6A;
  --accent-warm: #FFB74D;
  --white: #FFFFFF;
  --text: #2C3E50;
  --text-secondary: #78909C;
  --radius: 20px;
  --radius-sm: 14px;
  --shadow: 0 4px 20px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--mint-bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* ===== Status Bar ===== */
.status-bar {
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text);
}

/* ===== Header ===== */
.app-header {
  padding: 0 20px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.back-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.7);
  font-size: 20px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
  color: var(--text);
}
.back-btn.visible { display: flex; }
.header-title {
  font-size: 22px;
  font-weight: 700;
  flex: 1;
}
.header-icon {
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.header-icon span {
  width: 32px; height: 32px;
  background: var(--green);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 16px;
}

/* ===== Pages ===== */
.page { display:none; padding:0 20px 100px; }
.page.active { display:block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ===== Home ===== */
.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.section-title .view-all {
  font-size: 13px;
  color: var(--green);
  font-weight: 500;
  cursor: pointer;
}

/* Horizontal scroll cards */
.scroll-row {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 8px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.scroll-row::-webkit-scrollbar { display: none; }

.feature-card {
  flex: 0 0 140px;
  scroll-snap-align: start;
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s;
}
.feature-card:active { transform: scale(0.96); }
.feature-card .card-img {
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 56px;
  position: relative;
}
.feature-card .card-img .badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--green);
  color: white;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.feature-card .card-body { padding: 10px 12px; }
.feature-card .card-body h4 { font-size: 13px; font-weight: 600; line-height: 1.3; }
.feature-card .card-body p { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* Category pills */
.pill-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 16px;
}
.pill-row::-webkit-scrollbar { display: none; }
.pill {
  flex: 0 0 auto;
  padding: 8px 20px;
  border-radius: 30px;
  background: var(--white);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid #E0E0E0;
  color: var(--text-secondary);
  transition: all 0.2s;
  white-space: nowrap;
}
.pill.active { background: var(--green); color: white; border-color: var(--green); }

/* Home grid */
.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.home-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px 14px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.home-card:active { transform: scale(0.96); }
.home-card .icon-circle {
  width: 56px; height: 56px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.home-card .label { font-size: 15px; font-weight: 600; }
.home-card .sublabel { font-size: 12px; color: var(--text-secondary); }

/* ===== Article List ===== */
.article-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 14px;
  align-items: center;
  cursor: pointer;
  transition: transform 0.2s;
}
.article-card:active { transform: scale(0.97); }
.article-card .thumb {
  width: 60px; height: 60px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
}
.article-card .info { flex: 1; min-width: 0; }
.article-card .info h4 { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.article-card .info .meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
.article-card .actions { display: flex; gap: 6px; }
.article-card .actions button {
  width: 34px; height: 34px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-btn-edit { background: #E8F5E9; color: var(--green); }
.icon-btn-del { background: #FFEBEE; color: #E53935; }

/* ===== Reading View (Dark) ===== */
.reading-page { background: var(--dark); min-height: 100vh; }
.reading-page .status-bar { color: #B0BEC5; }
.reading-page .back-btn { background: rgba(255,255,255,0.1); color: white; }

.reading-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 20px;
}
.mode-toggle {
  display: flex;
  background: var(--dark-surface);
  border-radius: 25px;
  padding: 4px;
}
.mode-btn {
  padding: 8px 24px;
  border-radius: 22px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  color: #78909C;
  background: transparent;
}
.mode-btn.active { background: var(--green); color: white; }

.reading-body {
  padding: 0 20px 140px;
}
.chapter-title {
  color: white;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
}
.reading-text {
  color: #CFD8DC;
  font-size: 18px;
  line-height: 2;
}
.reading-text .para {
  margin-bottom: 16px;
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  border-left: 3px solid transparent;
}
.reading-text .para:hover { background: rgba(255,255,255,0.04); }
.reading-text .para.speaking {
  background: rgba(102,187,106,0.12);
  border-left-color: var(--accent);
}
.reading-text .para .highlight {
  background: linear-gradient(120deg, rgba(102,187,106,0.35) 0%, rgba(102,187,106,0.15) 100%);
  border-radius: 4px;
  padding: 1px 3px;
  color: #A5D6A7;
}

/* Font size control */
.font-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.font-btn {
  width: 44px; height: 44px;
  border-radius: 12px;
  border: 1.5px solid #455A64;
  background: var(--dark-surface);
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.font-size-display {
  background: var(--green);
  color: white;
  padding: 8px 20px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 700;
  min-width: 60px;
  text-align: center;
}

/* ===== Audio Player Bar ===== */
.player-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--dark-card);
  border-radius: 28px 28px 0 0;
  padding: 20px 24px 28px;
  box-shadow: 0 -4px 30px rgba(0,0,0,0.3);
  z-index: 100;
}
.player-bar .progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.player-bar .time { font-size: 12px; color: #78909C; min-width: 50px; font-variant-numeric: tabular-nums; }
.player-bar .time.right { text-align: right; }
.progress-track {
  flex: 1;
  height: 4px;
  background: #37474F;
  border-radius: 4px;
  position: relative;
  cursor: pointer;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 4px;
  width: 0%;
  transition: width 0.3s;
}
.progress-thumb {
  position: absolute;
  top: 50%;
  left: 0%;
  transform: translate(-50%, -50%);
  width: 14px; height: 14px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.ctrl-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: #B0BEC5;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.ctrl-btn:hover { color: white; }
.ctrl-btn.play-btn {
  width: 60px; height: 60px;
  background: var(--green);
  color: white;
  font-size: 28px;
  box-shadow: 0 4px 15px rgba(76,175,80,0.4);
}
.ctrl-btn.play-btn:active { transform: scale(0.93); }

/* ===== Light-mode controls ===== */
.controls-light {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--white);
  border-radius: 24px 24px 0 0;
  padding: 16px 24px 28px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  z-index: 100;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.btn:active { transform: scale(0.96); }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: var(--green-dark); }
.btn-orange { background: var(--accent-warm); color: white; }
.btn-red { background: #E53935; color: white; }
.btn-outline { background: transparent; border: 2px solid var(--green); color: var(--green); }
.btn-white { background: var(--white); color: var(--text); box-shadow: var(--shadow); }
.btn-block { width: 100%; }
.btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 10px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== Form ===== */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--text-secondary); }
.form-input {
  width: 100%; padding: 14px 16px;
  border: 2px solid #E0E0E0; border-radius: var(--radius-sm);
  font-size: 16px; font-family: inherit;
  background: #FAFAFA; transition: border-color 0.2s;
}
.form-input:focus { outline: none; border-color: var(--green); background: white; }
textarea.form-input { min-height: 180px; resize: vertical; line-height: 1.8; }

/* ===== Speed Control ===== */
.speed-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: var(--dark-surface); border-radius: var(--radius-sm);
  margin-bottom: 16px;
}
.speed-bar label { font-size: 13px; font-weight: 600; color: #B0BEC5; white-space: nowrap; }
.speed-bar input[type=range] { flex: 1; accent-color: var(--green); }
.speed-bar .val { font-size: 14px; font-weight: 700; color: var(--accent); min-width: 40px; text-align: center; }

/* ===== Review ===== */
.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.review-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
.review-content { font-size: 16px; line-height: 1.9; color: var(--text); margin-bottom: 16px; max-height: 300px; overflow-y: auto; }

.recording-indicator {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 600; color: #E53935; margin-bottom: 14px;
}
.rec-dot { width: 12px; height: 12px; background: #E53935; border-radius: 50%; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ===== Records ===== */
.tabs {
  display: flex; background: var(--white); border-radius: 14px;
  padding: 4px; margin-bottom: 16px; box-shadow: var(--shadow);
}
.tab-btn {
  flex: 1; padding: 10px; border: none; background: transparent;
  border-radius: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; color: var(--text-secondary); font-family: inherit;
  transition: all 0.2s;
}
.tab-btn.active { background: var(--green); color: white; }

.record-item {
  background: var(--white); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
}
.record-item h4 { font-size: 15px; margin-bottom: 4px; }
.record-item .meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
.record-item audio { width: 100%; margin-top: 8px; border-radius: 8px; }

/* ===== Modal ===== */
.modal-overlay {
  display:none; position:fixed; top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.45); z-index:200;
  justify-content:center; align-items:flex-end; padding:0;
}
.modal-overlay.active { display:flex; }
.modal {
  background: white; border-radius: 24px 24px 0 0;
  padding: 28px 24px 32px; width: 100%; max-width: 480px;
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal h2 { font-size: 18px; margin-bottom: 20px; text-align: center; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions .btn { flex: 1; }

/* ===== Empty ===== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty-state .icon { font-size: 56px; margin-bottom: 14px; }
.empty-state p { font-size: 15px; }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--dark); color: white;
  padding: 12px 28px; border-radius: 30px;
  font-size: 14px; font-weight: 500;
  opacity: 0; transition: all 0.3s; z-index: 300; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Mascot ===== */
.mascot {
  width: 80px; height: 80px;
  margin: 0 auto 8px;
  font-size: 72px;
  text-align: center;
  line-height: 1;
}

/* ===== Voice / Lang Selectors ===== */
.setting-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--dark-surface); border-radius: var(--radius-sm);
  margin-bottom: 12px;
}
.setting-row label { font-size: 13px; font-weight: 600; color: #B0BEC5; white-space: nowrap; min-width: 50px; }
.setting-row select {
  flex: 1; padding: 8px 12px; border-radius: 10px; border: 1.5px solid #455A64;
  background: var(--dark); color: #CFD8DC; font-size: 14px; font-family: inherit;
  appearance: auto;
}
.setting-row-light {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: #F5F5F5; border-radius: var(--radius-sm);
  margin-bottom: 12px;
}
.setting-row-light label { font-size: 13px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; min-width: 50px; }
.setting-row-light select {
  flex: 1; padding: 8px 12px; border-radius: 10px; border: 1.5px solid #E0E0E0;
  background: white; color: var(--text); font-size: 14px; font-family: inherit;
}
.lang-toggle {
  display: flex; background: var(--dark-surface); border-radius: 12px; padding: 3px; gap: 2px;
}
.lang-btn {
  padding: 6px 16px; border-radius: 10px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  color: #78909C; background: transparent; transition: all 0.2s;
}
.lang-btn.active { background: var(--green); color: white; }

/* ===== Import ===== */
.import-row {
  display: flex; gap: 10px; margin-bottom: 16px;
}
.import-row .btn { flex: 1; }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ===== PAGE: Home ===== -->
<div class="page active" id="page-home">
  <div class="status-bar">
    <span id="clockDisplay">9:41</span>
    <span></span>
  </div>
  <div class="app-header">
    <div class="header-icon"><span>&#128214;</span></div>
    <div class="header-title">ReadBuddy</div>
  </div>

  <div class="section-title">功能選單</div>
  <div class="home-grid">
    <div class="home-card" onclick="navigateTo('reading-list')">
      <div class="icon-circle" style="background:#E8F5E9;">&#128214;</div>
      <div class="label">閱讀</div>
      <div class="sublabel">朗讀練習</div>
    </div>
    <div class="home-card" onclick="navigateTo('review')">
      <div class="icon-circle" style="background:#FFF3E0;">&#127908;</div>
      <div class="label">複習</div>
      <div class="sublabel">錄音練習</div>
    </div>
    <div class="home-card" onclick="navigateTo('records')">
      <div class="icon-circle" style="background:#E3F2FD;">&#128202;</div>
      <div class="label">紀錄</div>
      <div class="sublabel">學習歷程</div>
    </div>
    <div class="home-card" onclick="navigateTo('settings')">
      <div class="icon-circle" style="background:#F3E5F5;">&#9881;&#65039;</div>
      <div class="label">設定</div>
      <div class="sublabel">文章管理</div>
    </div>
  </div>

  <div class="section-title">最近文章 <span class="view-all" onclick="navigateTo('reading-list')">查看全部</span></div>
  <div class="scroll-row" id="recentArticles">
    <div style="flex:0 0 100%;text-align:center;padding:30px 0;color:var(--text-secondary);font-size:14px;">尚無文章，請先到設定新增</div>
  </div>
</div>

<!-- ===== PAGE: Settings ===== -->
<div class="page" id="page-settings">
  <div class="status-bar"><span id="clock2">9:41</span><span></span></div>
  <div class="app-header">
    <button class="back-btn visible" onclick="goBack()">&#8592;</button>
    <div class="header-title">文章管理</div>
  </div>
  <div class="import-row">
    <button class="btn btn-green" onclick="openArticleModal()" style="flex:1;">+ 新增文章</button>
    <button class="btn btn-outline" onclick="document.getElementById('fileImport').click()" style="flex:1;">&#128194; 匯入文章</button>
  </div>
  <input type="file" id="fileImport" accept=".txt,.md,.text" style="display:none;" onchange="importArticle(event)">
  <div id="articleList"></div>
</div>

<!-- ===== PAGE: Reading List ===== -->
<div class="page" id="page-reading-list">
  <div class="status-bar"><span id="clock3">9:41</span><span></span></div>
  <div class="app-header">
    <button class="back-btn visible" onclick="goBack()">&#8592;</button>
    <div class="header-title">選擇文章</div>
  </div>
  <div class="pill-row">
    <div class="pill active">全部</div>
  </div>
  <div id="readingArticleList"></div>
</div>

<!-- ===== PAGE: Reading (Dark Mode) ===== -->
<div class="page reading-page" id="page-reading">
  <div class="status-bar"><span id="clock4">9:41</span><span></span></div>
  <div class="app-header">
    <button class="back-btn visible" onclick="goBack()" style="background:rgba(255,255,255,0.1);color:white;">&#8592;</button>
    <div style="flex:1;"></div>
    <div class="mode-toggle">

<script>
// ========================================
// IndexedDB
// ========================================
const DB_NAME='ReadBuddyDB', DB_VER=1;
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('articles'))d.createObjectStore('articles',{keyPath:'id'});if(!d.objectStoreNames.contains('readingLogs')){const s=d.createObjectStore('readingLogs',{keyPath:'id',autoIncrement:true});s.createIndex('articleId','articleId',{unique:false});}if(!d.objectStoreNames.contains('recordings')){const s=d.createObjectStore('recordings',{keyPath:'id',autoIncrement:true});s.createIndex('articleId','articleId',{unique:false});}};r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e);})}
function dbPut(s,d){return new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).put(d);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
function dbAll(s){return new Promise((res,rej)=>{const r=db.transaction(s,'readonly').objectStore(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
function dbGet(s,id){return new Promise((res,rej)=>{const r=db.transaction(s,'readonly').objectStore(s).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
function dbDel(s,id){return new Promise((res,rej)=>{const r=db.transaction(s,'readwrite').objectStore(s).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);})}

// ========================================
// Navigation
// ========================================
let navStack=['home'];
function navigateTo(id,noStack){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(!noStack)navStack.push(id);
  if(id==='reading'){document.body.style.background=getComputedStyle(document.documentElement).getPropertyValue('--dark');}
  else{document.body.style.background='';}
  onPageEnter(id);
}
function goBack(){
  stopReading();stopRecIfNeeded();
  if(navStack.length>1){navStack.pop();navigateTo(navStack[navStack.length-1],true);}
}
async function onPageEnter(id){
  if(id==='home')renderRecentArticles();
  if(id==='settings')renderArticleList();
  if(id==='reading-list')renderReadingList();
  if(id==='review')renderReviewPage();
  if(id==='records')renderRecords();
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Clock
function updateClock(){const n=new Date();const t=n.getHours()+':'+String(n.getMinutes()).padStart(2,'0');document.querySelectorAll('[id^=clock]').forEach(e=>e.textContent=t);document.getElementById('clockDisplay').textContent=t;}
setInterval(updateClock,30000);updateClock();

// ========================================
// Articles CRUD
// ========================================
let editingId=null;
const articleColors=['#E8F5E9','#FFF3E0','#E3F2FD','#FCE4EC','#F3E5F5','#E0F7FA','#FFF9C4'];
const articleIcons=['&#128218;','&#128214;','&#128213;','&#128217;','&#128216;','&#128215;','&#128211;'];
function getArticleVisual(idx){return{bg:articleColors[idx%articleColors.length],icon:articleIcons[idx%articleIcons.length]};}

function openArticleModal(id){
  editingId=id||null;
  document.getElementById('modalTitle').textContent=id?'編輯文章':'新增文章';
  document.getElementById('inputTitle').value='';
  document.getElementById('inputContent').value='';
  if(id){dbGet('articles',id).then(a=>{if(a){document.getElementById('inputTitle').value=a.title;document.getElementById('inputContent').value=a.paragraphs.join('\n\n');}});}
  document.getElementById('articleModal').classList.add('active');
}
function closeArticleModal(){document.getElementById('articleModal').classList.remove('active');editingId=null;}

async function saveArticle(){
  const title=document.getElementById('inputTitle').value.trim();
  const content=document.getElementById('inputContent').value.trim();
  if(!title||!content){showToast('請輸入標題和內容');return;}
  const paragraphs=content.split(/\n\s*\n/).map(p=>p.trim()).filter(p=>p);
  const art={id:editingId||'art_'+Date.now(),title,paragraphs,updatedAt:new Date().toISOString()};
  if(editingId){const ex=await dbGet('articles',editingId);if(ex)art.createdAt=ex.createdAt;}
  if(!art.createdAt)art.createdAt=art.updatedAt;
  await dbPut('articles',art);
  closeArticleModal();
  showToast(editingId?'文章已更新':'文章已新增');
  renderArticleList();
}
async function deleteArticle(id){if(!confirm('確定刪除？'))return;await dbDel('articles',id);showToast('已刪除');renderArticleList();}

async function renderArticleList(){
  const arts=await dbAll('articles');
  const c=document.getElementById('articleList');
  if(!arts.length){c.innerHTML='<div class="empty-state"><div class="icon">&#128221;</div><p>點選上方按鈕新增文章</p></div>';return;}
  c.innerHTML=arts.map((a,i)=>{const v=getArticleVisual(i);return`
    <div class="article-card">
      <div class="thumb" style="background:${v.bg}">${v.icon}</div>
      <div class="info"><h4>${esc(a.title)}</h4><div class="meta">${a.paragraphs.length} 段落 · ${a.paragraphs.join('').length} 字</div></div>
      <div class="actions">
        <button class="icon-btn-edit" onclick="event.stopPropagation();openArticleModal('${a.id}')">&#9998;</button>
        <button class="icon-btn-del" onclick="event.stopPropagation();deleteArticle('${a.id}')">&#128465;</button>
      </div>
    </div>`;}).join('');
}

async function renderRecentArticles(){
  const arts=await dbAll('articles');
  const c=document.getElementById('recentArticles');
  if(!arts.length){c.innerHTML='<div style="flex:0 0 100%;text-align:center;padding:30px 0;color:var(--text-secondary);font-size:14px;">尚無文章，請先到設定新增</div>';return;}
  c.innerHTML=arts.slice(-6).reverse().map((a,i)=>{const v=getArticleVisual(i);return`
    <div class="feature-card" onclick="openReading('${a.id}')">
      <div class="card-img" style="background:${v.bg}">${v.icon}<span class="badge">${a.paragraphs.length} 段</span></div>
      <div class="card-body"><h4>${esc(a.title)}</h4><p>${a.paragraphs.join('').length} 字</p></div>
    </div>`;}).join('');
}

async function renderReadingList(){
  const arts=await dbAll('articles');
  const c=document.getElementById('readingArticleList');
  if(!arts.length){c.innerHTML='<div class="empty-state"><div class="icon">&#128214;</div><p>請先到設定新增文章</p></div>';return;}
  c.innerHTML=arts.map((a,i)=>{const v=getArticleVisual(i);return`
    <div class="article-card" onclick="openReading('${a.id}')">
      <div class="thumb" style="background:${v.bg}">${v.icon}</div>
      <div class="info"><h4>${esc(a.title)}</h4><div class="meta">${a.paragraphs.length} 段落 · ${a.paragraphs.join('').length} 字</div></div>
      <div style="color:var(--green);font-size:22px;">&#9654;</div>
    </div>`;}).join('');
}

// ========================================
// Import Article
// ========================================
async function importArticle(event){
  const file=event.target.files[0];
  if(!file)return;
  const text=await file.text();
  const name=file.name.replace(/\.[^.]+$/,'');
  const paragraphs=text.split(/\n\s*\n/).map(p=>p.trim()).filter(p=>p);
  if(!paragraphs.length){showToast('檔案內容為空');return;}
  const art={id:'art_'+Date.now(),title:name,paragraphs,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  await dbPut('articles',art);
  showToast('已匯入：'+name);
  renderArticleList();
  event.target.value='';
}

// ========================================
// Voice & Language
// ========================================
let allVoices=[];
let currentLang='en-US';
let selectedVoiceURI='';
const voiceLabels={};  // map voiceURI -> friendly label

function loadVoices(){
  allVoices=window.speechSynthesis.getVoices();
  populateVoiceSelect();
}
window.speechSynthesis.onvoiceschanged=loadVoices;
setTimeout(loadVoices,500); // fallback

function populateVoiceSelect(){
  const sel=document.getElementById('voiceSelect');
  const filtered=allVoices.filter(v=>v.lang.startsWith(currentLang.split('-')[0]));
  if(!filtered.length){
    // fallback: show all voices with matching prefix or all
    const fallback=allVoices.filter(v=>v.lang.includes(currentLang==='zh-TW'?'zh':'en'));
    renderVoiceOptions(fallback.length?fallback:allVoices);
    return;
  }
  renderVoiceOptions(filtered);
}

function renderVoiceOptions(voices){
  const sel=document.getElementById('voiceSelect');
  // Categorize voices into male/female groups
  let maleCount=0, femaleCount=0;
  sel.innerHTML='';

  voices.forEach((v,i)=>{
    const opt=document.createElement('option');
    opt.value=v.voiceURI;
    // Attempt to determine gender from voice name
    const nameLower=v.name.toLowerCase();
    let label='';
    if(nameLower.includes('female')||nameLower.includes('woman')||nameLower.match(/\b(zira|hazel|susan|linda|heera|huihui|tracy|yating|hanhan|xiaoxiao|xiaoyi|jenny|aria|sara|amy|emma|joanna|salli|kendra|ivy|zhiwei|meijia)\b/i)){
      femaleCount++;
      label='女生 '+femaleCount+' ('+v.name.split(' ').slice(0,3).join(' ')+')';
    } else if(nameLower.includes('male')||nameLower.includes('man ')||nameLower.match(/\b(david|mark|james|george|richard|daniel|ryan|guy|matthew|brian|joey|justin|kevin|yunyang|yunxi|kangkang|zhiyu)\b/i)){
      maleCount++;
      label='男生 '+maleCount+' ('+v.name.split(' ').slice(0,3).join(' ')+')';
    } else {
      // Can't determine, just use name
      label=v.name;
    }
    opt.textContent=label;
    voiceLabels[v.voiceURI]=label;
    sel.appendChild(opt);
  });

  // Select previously chosen or first
  if(selectedVoiceURI && voices.find(v=>v.voiceURI===selectedVoiceURI)){
    sel.value=selectedVoiceURI;
  } else if(voices.length){
    sel.value=voices[0].voiceURI;
    selectedVoiceURI=voices[0].voiceURI;
  }
}

function setSelectedVoice(){
  selectedVoiceURI=document.getElementById('voiceSelect').value;
}

function setLang(lang){
  currentLang=lang;
  document.getElementById('langZh').classList.toggle('active',lang==='zh-TW');
  document.getElementById('langEn').classList.toggle('active',lang==='en-US');
  populateVoiceSelect();
  // If currently speaking, stop
  if(speaking)stopReading();
}

function getSelectedVoice(){
  if(!selectedVoiceURI)return null;
  return allVoices.find(v=>v.voiceURI===selectedVoiceURI)||null;
}

// ========================================
// Reading (TTS)
// ========================================
let curArticle=null, curPara=-1, speaking=false, paused=false, readStart=null;
let readingTimer=null, elapsedSec=0;
let fontSize=20;

document.getElementById('speedRange').addEventListener('input',function(){document.getElementById('speedVal').textContent=this.value+'x';});

function changeFontSize(delta){
  fontSize=Math.max(14,Math.min(32,fontSize+delta));
  document.getElementById('fontSizeDisplay').textContent=fontSize;
  const el=document.getElementById('readingContent');
  if(el)el.style.fontSize=fontSize+'px';
}
function setMode(mode){
  document.getElementById('modeAudio').classList.toggle('active',mode==='audio');
  document.getElementById('modeText').classList.toggle('active',mode==='text');
  document.getElementById('playerBar').style.display=mode==='audio'?'':'none';
  document.querySelector('.speed-bar').style.display=mode==='audio'?'':'none';
}

async function openReading(id){
  curArticle=await dbGet('articles',id);
  if(!curArticle)return;
  document.getElementById('readingTitle').textContent=curArticle.title;
  const c=document.getElementById('readingContent');
  c.style.fontSize=fontSize+'px';
  c.innerHTML=curArticle.paragraphs.map((p,i)=>`<div class="para" data-i="${i}" onclick="playParagraph(${i})">${esc(p)}</div>`).join('');
  resetReadUI();
  navigateTo('reading');
}

function resetReadUI(){
  curPara=-1;speaking=false;paused=false;elapsedSec=0;
  clearInterval(readingTimer);
  updatePlayBtn();updateTimeDisplay();updateProgress();
  document.querySelectorAll('.para').forEach(p=>p.classList.remove('speaking'));
}

function updatePlayBtn(){
  const btn=document.getElementById('btnPlay');
  btn.innerHTML=speaking&&!paused?'&#10074;&#10074;':'&#9654;';
}

function togglePlay(){
  if(!curArticle)return;
  if(speaking&&!paused){pauseReading();}
  else if(paused){resumeReading();}
  else{playAll();}
}

function playAll(){
  curPara=0;readStart=Date.now();elapsedSec=0;
  speakPara(0,true);
  startTimer();
}

function playParagraph(i){
  if(speaking)stopReading();
  curPara=i;readStart=Date.now();elapsedSec=0;
  speakPara(i,false);
  startTimer();
}

function speakPara(i,cont){
  if(!curArticle||i>=curArticle.paragraphs.length){finishReading();return;}
  window.speechSynthesis.cancel();
  speaking=true;paused=false;
  highlightPara(i);
  const u=new SpeechSynthesisUtterance(curArticle.paragraphs[i]);
  u.lang=currentLang;
  u.rate=parseFloat(document.getElementById('speedRange').value);
  const voice=getSelectedVoice();
  if(voice)u.voice=voice;
  u.onend=()=>{if(cont&&speaking){curPara=i+1;speakPara(i+1,true);}else if(!cont){finishReading();}};
  u.onerror=e=>{if(e.error!=='canceled')finishReading();};
  window.speechSynthesis.speak(u);
  updatePlayBtn();
}

function pauseReading(){window.speechSynthesis.pause();paused=true;clearInterval(readingTimer);updatePlayBtn();}
function resumeReading(){window.speechSynthesis.resume();paused=false;startTimer();updatePlayBtn();}

function stopReading(){
  window.speechSynthesis.cancel();
  if(speaking&&readStart)logReading();
  speaking=false;paused=false;clearInterval(readingTimer);
  resetReadUI();
}

function finishReading(){
  if(readStart)logReading();
  speaking=false;clearInterval(readingTimer);
  resetReadUI();
  showToast('朗讀完畢！');
}

function prevParagraph(){if(!curArticle||curPara<=0)return;stopReading();playParagraph(curPara-1);}
function nextParagraph(){if(!curArticle||curPara>=curArticle.paragraphs.length-1)return;stopReading();playParagraph(curPara+1);}

function adjustSpeed(d){
  const r=document.getElementById('speedRange');
  let v=Math.round((parseFloat(r.value)+d)*10)/10;
  v=Math.max(0.5,Math.min(2,v));
  r.value=v;
  document.getElementById('speedVal').textContent=v+'x';
}

function highlightPara(i){
  document.querySelectorAll('.para').forEach(p=>p.classList.remove('speaking'));
  const el=document.querySelector(`.para[data-i="${i}"]`);
  if(el){el.classList.add('speaking');el.scrollIntoView({behavior:'smooth',block:'center'});}
}

function startTimer(){
  clearInterval(readingTimer);
  readingTimer=setInterval(()=>{elapsedSec++;updateTimeDisplay();updateProgress();},1000);
}
function updateTimeDisplay(){document.getElementById('timeElapsed').textContent=fmtTime(elapsedSec);
  const total=curArticle?curArticle.paragraphs.join('').length/3:0; // rough estimate
  document.getElementById('timeTotal').textContent=fmtTime(Math.max(total,elapsedSec));
}
function updateProgress(){
  if(!curArticle||curArticle.paragraphs.length===0)return;
  const pct=Math.min(100,((curPara+1)/curArticle.paragraphs.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressThumb').style.left=pct+'%';
}
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}

async function logReading(){
  if(!curArticle||!readStart)return;
  const dur=Math.round((Date.now()-readStart)/1000);
  await dbPut('readingLogs',{articleId:curArticle.id,articleTitle:curArticle.title,date:new Date().toISOString(),durationSeconds:dur});
  readStart=null;
}

// ========================================
// Review (Recording)
// ========================================
let mediaRec=null,audioChunks=[],recBlob=null,recTimer=null,recSec=0,reviewArtId=null;

async function renderReviewPage(){
  const arts=await dbAll('articles');
  const c=document.getElementById('reviewArticleSelect');
  if(!arts.length){c.innerHTML='<div class="empty-state"><div class="icon">&#127908;</div><p>請先新增文章</p></div>';document.getElementById('reviewRecordingCard').style.display='none';return;}
  c.innerHTML=arts.map((a,i)=>{const v=getArticleVisual(i);return`
    <div class="article-card" onclick="selectReviewArt('${a.id}')">
      <div class="thumb" style="background:${v.bg}">${v.icon}</div>
      <div class="info"><h4>${esc(a.title)}</h4><div class="meta">${a.paragraphs.length} 段落</div></div>
      <div style="color:var(--accent-warm);font-size:22px;">&#127908;</div>
    </div>`;}).join('');
}

async function selectReviewArt(id){
  const a=await dbGet('articles',id);if(!a)return;
  reviewArtId=id;
  document.getElementById('reviewArticleTitle').textContent=a.title;
  document.getElementById('reviewContent').innerHTML=a.paragraphs.map(p=>`<p style="margin-bottom:10px;">${esc(p)}</p>`).join('');
  document.getElementById('reviewRecordingCard').style.display='';
  resetRecUI();
}

function resetRecUI(){
  document.getElementById('btnRecord').innerHTML='&#127908; 開始錄音';
  document.getElementById('btnPlayRec').style.display='none';
  document.getElementById('btnSaveRec').style.display='none';
  document.getElementById('recordingIndicator').style.display='none';
  document.getElementById('reviewAudio').style.display='none';
  recBlob=null;
}

async function toggleRecording(){
  if(mediaRec&&mediaRec.state==='recording'){
    mediaRec.stop();clearInterval(recTimer);
    document.getElementById('btnRecord').innerHTML='&#127908; 重新錄音';
    document.getElementById('recordingIndicator').style.display='none';
    return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRec.onstop=()=>{
      recBlob=new Blob(audioChunks,{type:'audio/webm'});
      const url=URL.createObjectURL(recBlob);
      const aud=document.getElementById('reviewAudio');
      aud.src=url;aud.style.display='';
      document.getElementById('btnPlayRec').style.display='';
      document.getElementById('btnSaveRec').style.display='';
      stream.getTracks().forEach(t=>t.stop());
      showToast('錄音完成');
    };
    mediaRec.start();
    recSec=0;
    document.getElementById('recordTimer').textContent='00:00';
    document.getElementById('recordingIndicator').style.display='flex';
    document.getElementById('btnRecord').innerHTML='&#9632; 停止錄音';
    document.getElementById('btnPlayRec').style.display='none';
    document.getElementById('btnSaveRec').style.display='none';
    recTimer=setInterval(()=>{recSec++;document.getElementById('recordTimer').textContent=String(Math.floor(recSec/60)).padStart(2,'0')+':'+String(recSec%60).padStart(2,'0');},1000);
  }catch(e){showToast('無法取得麥克風權限');}
}
function stopRecIfNeeded(){if(mediaRec&&mediaRec.state==='recording'){mediaRec.stop();clearInterval(recTimer);}}
function playRecording(){document.getElementById('reviewAudio').play();}
async function saveRecording(){
  if(!recBlob||!reviewArtId)return;
  const reader=new FileReader();
  reader.onloadend=async()=>{
    await dbPut('recordings',{articleId:reviewArtId,articleTitle:document.getElementById('reviewArticleTitle').textContent,date:new Date().toISOString(),audioData:reader.result,durationSeconds:recSec});
    showToast('錄音已儲存');resetRecUI();
  };reader.readAsDataURL(recBlob);
}

// ========================================
// Records
// ========================================
function switchRecordTab(el,tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('readingRecords').style.display=tab==='reading'?'':'none';
  document.getElementById('audioRecords').style.display=tab==='audio'?'':'none';
}

async function renderRecords(){
  const logs=await dbAll('readingLogs');
  const lc=document.getElementById('readingRecords');
  if(!logs.length){lc.innerHTML='<div class="empty-state"><div class="icon">&#128202;</div><p>還沒有朗讀紀錄</p></div>';}
  else{
    const g={};logs.forEach(l=>{if(!g[l.articleId])g[l.articleId]={title:l.articleTitle,count:0,total:0,last:l.date};g[l.articleId].count++;g[l.articleId].total+=l.durationSeconds;if(l.date>g[l.articleId].last)g[l.articleId].last=l.date;});
    lc.innerHTML=Object.entries(g).map(([id,v])=>`
      <div class="record-item">
        <h4>${esc(v.title)}</h4>
        <div class="meta"><span>&#128337; ${v.count} 次</span><span>&#9201; ${fmtDur(v.total)}</span><span>&#128197; ${fmtDate(v.last)}</span></div>
      </div>`).join('');
  }
  const recs=await dbAll('recordings');
  const ac=document.getElementById('audioRecords');
  if(!recs.length){ac.innerHTML='<div class="empty-state"><div class="icon">&#127908;</div><p>還沒有錄音紀錄</p></div>';}
  else{
    ac.innerHTML=recs.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`
      <div class="record-item">
        <h4>${esc(r.articleTitle)}</h4>
        <div class="meta"><span>&#128197; ${fmtDate(r.date)}</span><span>&#9201; ${fmtDur(r.durationSeconds)}</span></div>
        <audio controls src="${r.audioData}" style="width:100%;border-radius:8px;"></audio>
        <button class="btn btn-red btn-sm" style="margin-top:8px;" onclick="delRec(${r.id})">&#128465; 刪除</button>
      </div>`).join('');
  }
}

async function delRec(id){if(!confirm('確定刪除？'))return;await dbDel('recordings',id);showToast('已刪除');renderRecords();}
function fmtDur(s){if(s<60)return s+' 秒';return Math.floor(s/60)+' 分 '+(s%60)+' 秒';}
function fmtDate(iso){const d=new Date(iso);return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

// ========================================
// Init
// ========================================
openDB().then(()=>{onPageEnter('home');}).catch(e=>{console.error(e);showToast('資料庫錯誤');});
</script>
